  background:linear-gradient(135deg,#fff,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  display:flex;align-items:center;gap:8px;text-decoration:none}
.nav-links{display:flex;gap:4px}
.nav-links button,
.nav-links a{background:none;border:none;color:var(--dim);font-size:0.82rem;font-weight:600;
  padding:6px 14px;border-radius:999px;cursor:pointer;letter-spacing:0.4px;text-transform:uppercase;transition:all 0.15s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.nav-links button:hover,.nav-links button.act,
.nav-links a:hover,.nav-links a.act{color:var(--cyan);background:rgba(0,214,255,0.08)}
.nav-right{display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:999px;border:none;
  cursor:pointer;font-size:0.82rem;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;transition:all 0.2s}
.btn-ghost{background:transparent;color:var(--cyan);border:1.5px solid rgba(0,214,255,0.35)}
.btn-ghost:hover{background:rgba(0,214,255,0.1);border-color:var(--cyan)}
.btn-cta{background:var(--cyan);color:#030f1b;box-shadow:0 4px 18px rgba(0,214,255,0.3)}
.btn-cta:hover{background:#fff;transform:translateY(-2px)}

.btn-success:hover{background:#1d9e75}

html{scroll-behavior:smooth}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── HEADER ── */
header{
  text-align:center;
  padding:5rem 2rem 3rem;
  position:relative;
  border-bottom:1px solid var(--border);
}
header::before{
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 80% at 50% -10%,rgba(18, 222, 226, 0.08),transparent 70%);
  pointer-events:none;
}
.header-eyebrow{
  display:inline-block;
  font-family:'JetBrains Mono',monospace;
  font-size:.72rem;font-weight:600;
  letter-spacing:.15em;text-transform:uppercase;
  color:var(--muted);
  border:1px solid var(--border);
  border-radius:4px;
  padding:.3rem .8rem;
  margin-bottom:1.25rem;
}
header h1{
  font-family:'Syne',sans-serif;
  font-size:clamp(2.5rem,6vw,5rem);
  font-weight:800;letter-spacing:-2px;
  color:var(--white);
  line-height:1.05;
  margin-bottom:.75rem;
}
header h1 .slash{color:rgba(146, 50, 50, 0.2)}
header p{
  max-width:500px;margin:0 auto;
  color:var(--muted);font-size:.95rem;line-height:1.7;
}

/* ── TRACK GRID ── */
.track-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:1px;
  background:var(--border);
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:50;
}
.track-tab{
  background:var(--bg);
  border:none;
  padding:.85rem .5rem;
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:.3rem;
  transition:background .2s;
  font-family:'Inter',sans-serif;
}
.track-tab:hover{background:var(--surface)}
.track-tab.active{background:var(--surface2)}
.track-tab.active .tab-dot{opacity:1;transform:scale(1)}
.tab-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--c,#fff);
  opacity:.35;transform:scale(.7);
  transition:opacity .25s,transform .25s;
}
.tab-label{
  font-size:.65rem;font-weight:600;
  letter-spacing:.04em;text-transform:uppercase;
  color:var(--muted);
  transition:color .2s;
  text-align:center;line-height:1.3;
}
.track-tab.active .tab-label{color:var(--c,var(--white))}

/* ── MAIN CONTENT ── */
.roadmap-area{
  max-width:900px;margin:0 auto;
  padding:3rem 2rem 6rem;
}

/* ── TRACK PANEL ── */
.track-panel{display:none}
.track-panel.active{display:block}

.track-header{
  display:flex;align-items:flex-start;gap:1.5rem;
  padding:2rem;
  background:var(--cg,rgba(255,255,255,.05));
  border:1px solid color-mix(in srgb,var(--c,white) 20%,transparent);
  border-radius:16px;
  margin-bottom:2.5rem;
}
.track-icon{
  font-size:2.2rem;line-height:1;
  flex-shrink:0;
}
.track-header h2{
  font-family:'Syne',sans-serif;
  font-size:1.75rem;font-weight:800;
  color:var(--white);letter-spacing:-.5px;
  margin-bottom:.3rem;
}
.track-header .track-desc{
  color:var(--muted);font-size:.9rem;line-height:1.65;
}
.track-header .duration-tag{
  display:inline-flex;align-items:center;gap:.4rem;
  font-family:'JetBrains Mono',monospace;
  font-size:.7rem;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;
  color:var(--c,var(--white));
  margin-top:.75rem;
}
.track-header .duration-tag::before{
  content:'';display:block;
  width:18px;height:1px;
  background:var(--c,white);
  opacity:.5;
}

/* ── PHASES ── */
.phase{
  margin-bottom:2rem;
  position:relative;
}
.phase::before{
  content:'';
  position:absolute;
  left:18px;top:44px;bottom:0;
  width:1px;
  background:var(--border);
}
.phase:last-child::before{display:none}

.phase-header{
  display:flex;align-items:center;gap:1rem;
  margin-bottom:1.25rem;
  cursor:pointer;
  user-select:none;
}
.phase-num{
  width:38px;height:38px;
  border-radius:50%;
  border:1px solid color-mix(in srgb,var(--c,white) 30%,transparent);
  background:var(--cg);
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;
  font-size:.75rem;font-weight:600;
  color:var(--c,var(--white));
  flex-shrink:0;
  transition:background .2s;
}
.phase-header:hover .phase-num{background:color-mix(in srgb,var(--c,white) 25%,transparent)}
.phase-title{
  font-family:'Syne',sans-serif;
  font-size:1.05rem;font-weight:700;
  color:var(--white);flex:1;
}
.phase-badge{
  font-family:'JetBrains Mono',monospace;
  font-size:.65rem;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:4px;
  padding:.2rem .5rem;
}
.phase-toggle{
  color:var(--muted);font-size:.9rem;
  transition:transform .3s;
}
.phase.open .phase-toggle{transform:rotate(180deg)}

.phase-body{
  padding-left:3.5rem;
  display:none;
}
.phase.open .phase-body{display:block}

/* ── SKILLS ── */
.skill-list{
  display:flex;flex-direction:column;gap:.6rem;
  margin-bottom:1.5rem;
}
.skill-item{
  display:flex;align-items:center;gap:.75rem;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:.7rem 1rem;
  font-size:.875rem;
  transition:border-color .2s,background .2s;
}
.skill-item:hover{
  border-color:color-mix(in srgb,var(--c,white) 20%,transparent);
  background:var(--surface2);
}
.skill-check{
  width:18px;height:18px;
  border-radius:50%;
  border:1.5px solid var(--border);
  flex-shrink:0;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,border-color .2s;
}
.skill-item.done .skill-check{
  background:var(--c,white);
  border-color:var(--c,white);
}
.skill-item.done .skill-check::after{
  content:'✓';font-size:.6rem;color:var(--bg);font-weight:700;
}
.skill-item.done .skill-name{
  text-decoration:line-through;
  color:var(--muted);
}
.skill-name{flex:1;color:var(--text)}
.skill-tag{
  font-family:'JetBrains Mono',monospace;
  font-size:.6rem;font-weight:600;
  letter-spacing:.06em;text-transform:uppercase;
  padding:.15rem .4rem;border-radius:3px;
  background:var(--cg);
  color:var(--c,var(--muted));
}

/* Resources */
.resources{
  margin-top:.75rem;
  display:flex;flex-wrap:wrap;gap:.5rem;
  margin-bottom:.5rem;
}
.res-link{
  font-size:.72rem;font-weight:600;
  font-family:'JetBrains Mono',monospace;
  text-decoration:none;
  color:var(--c,var(--text));
  border:1px solid color-mix(in srgb,var(--c,white) 25%,transparent);
  border-radius:4px;
  padding:.2rem .6rem;
  transition:background .2s;
}
.res-link:hover{background:var(--cg)}

/* Progress bar */
.progress-bar-wrap{
  background:var(--border);
  border-radius:100px;
  height:4px;
  margin-bottom:2rem;
  overflow:hidden;
}
.progress-bar{
  height:100%;
  background:var(--c,white);
  border-radius:100px;
  transition:width .4s ease;
}
.progress-label{
  font-family:'JetBrains Mono',monospace;
  font-size:.7rem;font-weight:600;
  color:var(--muted);
  margin-bottom:.5rem;
  display:flex;justify-content:space-between;
}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .track-grid{grid-template-columns:repeat(4,1fr)}
  .track-header{flex-direction:column;gap:.75rem}
  .phase-body{padding-left:2.5rem}
}
</style>

// State
const progress = {};

function saveProgress(){
  try{ localStorage.setItem('cgec_progress', JSON.stringify(progress)); }catch(e){}
}
function loadProgress(){
  try{
    const d = localStorage.getItem('cgec_progress');
    if(d) Object.assign(progress, JSON.parse(d));
  }catch(e){}
}
loadProgress();

function buildUI(){
  const grid = document.getElementById('trackGrid');
  const area = document.getElementById('roadmapArea');

  tracks.forEach((t,ti) => {
    // Tab
    const btn = document.createElement('button');
    btn.className = `track-tab ${t.cls}`;
    btn.id = `tab-${t.id}`;
    btn.innerHTML = `<span class="tab-dot"></span><span class="tab-label">${t.label}</span>`;
    btn.onclick = () => activateTrack(t.id);
    grid.appendChild(btn);

    // Panel
    const panel = document.createElement('div');
    panel.className = `track-panel ${t.cls}`;
    panel.id = `panel-${t.id}`;

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'track-header';
    hdr.innerHTML = `
      <div class="track-icon">${t.icon}</div>
      <div>
        <h2>${t.label}</h2>
        <p class="track-desc">${t.desc}</p>
        <div class="duration-tag">Estimated: ${t.duration}</div>
      </div>
    `;
    panel.appendChild(hdr);

    // Progress
    const pLabel = document.createElement('div');
    pLabel.className = 'progress-label';
    pLabel.id = `plabel-${t.id}`;
    pLabel.innerHTML = '<span>Progress</span><span>0%</span>';
    panel.appendChild(pLabel);

    const pWrap = document.createElement('div');
    pWrap.className = 'progress-bar-wrap';
    const pBar = document.createElement('div');
    pBar.className = 'progress-bar';
    pBar.id = `pbar-${t.id}`;
    pBar.style.width = '0%';
    pWrap.appendChild(pBar);
    panel.appendChild(pWrap);

    // Phases
    t.phases.forEach((ph, pi) => {
      const phaseEl = document.createElement('div');
      phaseEl.className = 'phase';
      phaseEl.id = `phase-${t.id}-${pi}`;

      const phHdr = document.createElement('div');
      phHdr.className = 'phase-header';
      phHdr.onclick = () => togglePhase(t.id, pi);
      phHdr.innerHTML = `
        <div class="phase-num">${String(pi+1).padStart(2,'0')}</div>
        <div class="phase-title">${ph.title}</div>
        <div class="phase-badge">${ph.badge}</div>
        <div class="phase-toggle">▼</div>
      `;
      phaseEl.appendChild(phHdr);

      const body = document.createElement('div');
      body.className = 'phase-body';

      const skillList = document.createElement('div');
      skillList.className = 'skill-list';

      ph.skills.forEach((sk, si) => {
        const key = `${t.id}-${pi}-${si}`;
        const item = document.createElement('div');
        item.className = `skill-item${progress[key] ? ' done' : ''}`;
        item.id = `skill-${key}`;
        item.innerHTML = `
          <div class="skill-check"></div>
          <span class="skill-name">${sk.name}</span>
          <span class="skill-tag">${sk.tag}</span>
        `;
        item.querySelector('.skill-check').onclick = (e) => {
          e.stopPropagation();
          progress[key] = !progress[key];
          item.classList.toggle('done', progress[key]);
          saveProgress();
          updateProgress(t);
        };
        skillList.appendChild(item);
      });

      body.appendChild(skillList);

      // Resources
      if(ph.resources && ph.resources.length){
        const resDiv = document.createElement('div');
        resDiv.className = 'resources';
        ph.resources.forEach(r => {
          const a = document.createElement('a');
          a.className = 'res-link';
          a.href = r.href;
          a.target = '_blank';
          a.rel = 'noopener';
          a.textContent = '↗ ' + r.label;
          resDiv.appendChild(a);
        });
        body.appendChild(resDiv);
      }

      phaseEl.appendChild(body);
      panel.appendChild(phaseEl);
    });

    area.appendChild(panel);
    updateProgress(t);
  });

  // Activate first
  activateTrack(tracks[0].id);
}

function activateTrack(id){
  document.querySelectorAll('.track-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.track-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${id}`).classList.add('active');
  document.getElementById(`panel-${id}`).classList.add('active');
  // Open first phase by default
  const firstPhase = document.getElementById(`phase-${id}-0`);
  if(firstPhase && !firstPhase.classList.contains('open')){
    firstPhase.classList.add('open');
  }
}

function togglePhase(tid, pi){
  const el = document.getElementById(`phase-${tid}-${pi}`);
  el.classList.toggle('open');
}

function updateProgress(t){
  let total = 0, done = 0;
  t.phases.forEach((ph, pi) => {
    ph.skills.forEach((sk, si) => {
      total++;
      if(progress[`${t.id}-${pi}-${si}`]) done++;
    });
  });
  const pct = total ? Math.round((done/total)*100) : 0;
  const bar = document.getElementById(`pbar-${t.id}`);
  const lbl = document.getElementById(`plabel-${t.id}`);
  if(bar) bar.style.width = pct + '%';
  if(lbl) lbl.innerHTML = `<span>${done}/${total} skills</span><span>${pct}%</span>`;
}

buildUI();
</script>
</body>
</html>
