<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05192b;
  --panel:rgba(5,25,43,0.85);
  --cyan:#00d6ff;
  --green:#3effe6;
  --surface:#0f1117;
  --surface2:#141720;
  --border:rgba(255,255,255,0.07);
  --muted:#4a5368;
  --text:#d8dce8;
  --white:#f0f2f8;
}

nav{
  position:sticky;top:1rem;z-index:100;
  max-width:1100px;margin:0 auto 1.5rem;
  display:flex;align-items:center;justify-content:space-between;
  gap:1rem;padding:.95rem 1.25rem;border-radius:999px;
  background:rgba(15,17,23,.92);
  border:1px solid var(--border);
  backdrop-filter:blur(12px);
}
.logo{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:var(--white);text-decoration:none;display:inline-flex;align-items:center;gap:.5rem}
.logo i{color:#38bdf8}
.nav-links{display:flex;gap:.5rem;flex-wrap:wrap}
.nav-links a{display:inline-flex;align-items:center;gap:.3rem;padding:.65rem 1rem;border-radius:999px;border:none;background:none;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:600;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:all .15s}
.nav-links a:hover,
.nav-links a.act{color:var(--white);background:rgba(255,255,255,.08)}
.nav-right{display:flex;gap:.5rem;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.6rem 1rem;border-radius:999px;border:none;cursor:pointer;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;transition:all .2s;text-decoration:none}
.btn-ghost{background:transparent;color:var(--white);border:1.5px solid rgba(255,255,255,.3)}
.btn-ghost:hover{background:rgba(255,255,255,.08);border-color:var(--white)}
.btn-cta{background:var(--white);color:#07090e;box-shadow:0 4px 18px rgba(255,255,255,.2)}
.btn-cta:hover{background:#f0f2f8;transform:translateY(-2px)}

html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* HEADER */
header{
  text-align:center;padding:4rem 2rem 2.5rem;
  border-bottom:1px solid var(--border);
  position:relative;overflow:hidden;
}
header::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 80% at 50% -10%,rgba(100,120,255,.07),transparent 70%);
  pointer-events:none;
}
.eyebrow{
  font-family:'JetBrains Mono',monospace;
  font-size:.7rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;
  color:var(--muted);border:1px solid var(--border);border-radius:4px;
  padding:.3rem .8rem;display:inline-block;margin-bottom:1.2rem;
}
header h1{
  font-family:'Syne',sans-serif;
  font-size:clamp(2rem,5vw,4rem);font-weight:800;letter-spacing:-2px;
  color:var(--white);line-height:1.05;margin-bottom:.6rem;
}
header p{max-width:520px;margin:0 auto;color:var(--muted);font-size:.9rem;line-height:1.7}

/* STATS BAR */
.stats-bar{
  display:flex;justify-content:center;gap:3rem;flex-wrap:wrap;
  padding:1.5rem 2rem;border-bottom:1px solid var(--border);
  background:var(--surface);
}
.stat{text-align:center}
.stat .val{
  font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;
  color:var(--white);letter-spacing:-1px;
}
.stat .lbl{font-size:.7rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:.2rem}

/* NAV */
.semester-nav{
  display:flex;gap:0;
  border-bottom:1px solid var(--border);
  background:var(--surface);
  overflow-x:auto;
  position:sticky;top:0;z-index:50;
}
.sem-tab{
  background:none;border:none;
  padding:.9rem 1.5rem;
  font-family:'JetBrains Mono',monospace;
  font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);cursor:pointer;white-space:nowrap;
  border-bottom:2px solid transparent;
  transition:color .2s,border-color .2s;
}
.sem-tab:hover{color:var(--text)}
.sem-tab.active{color:var(--white);border-bottom-color:var(--white)}

/* MAIN */
.main{max-width:1000px;margin:0 auto;padding:2rem 1.5rem 6rem}

/* SEMESTER BLOCK */
.semester{display:none}
.semester.active{display:block}
.semester-title{
  font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;
  color:var(--white);letter-spacing:-.5px;
  margin-bottom:.4rem;
}
.semester-sub{color:var(--muted);font-size:.85rem;margin-bottom:2rem}

/* WEEK CARD */
.week-card{
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  margin-bottom:1px;
  transition:border-color .2s;
}
.week-card:hover{border-color:rgba(255,255,255,.12)}
.week-card.current{border-color:rgba(255,255,255,.25)!important}

.week-header{
  display:grid;
  grid-template-columns:56px 1fr auto;
  align-items:center;gap:1rem;
  padding:.9rem 1.25rem;
  cursor:pointer;
  background:var(--surface);
  user-select:none;
}
.week-header:hover{background:var(--surface2)}
.week-num{
  font-family:'JetBrains Mono',monospace;
  font-size:.65rem;font-weight:600;letter-spacing:.1em;
  color:var(--muted);text-transform:uppercase;
}
.week-title-wrap{}
.week-date{
  font-family:'JetBrains Mono',monospace;
  font-size:.68rem;font-weight:600;
  color:var(--muted);margin-bottom:.15rem;
}
.week-title{
  font-size:.9rem;font-weight:600;color:var(--white);
  display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;
}
.track-pill{
  font-size:.6rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  padding:.15rem .45rem;border-radius:3px;
  background:var(--cg);color:var(--c);
  border:1px solid color-mix(in srgb,var(--c) 30%,transparent);
}
.week-toggle{color:var(--muted);font-size:.8rem;transition:transform .3s}
.week-card.open .week-toggle{transform:rotate(180deg)}
.current-badge{
  font-family:'JetBrains Mono',monospace;
  font-size:.6rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:#4ade80;background:rgba(74,222,128,.1);
  border:1px solid rgba(74,222,128,.25);border-radius:3px;
  padding:.15rem .45rem;animation:blink 2s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}

.week-body{display:none;padding:1.25rem;background:var(--bg);border-top:1px solid var(--border)}
.week-card.open .week-body{display:block}

/* DAYS GRID */
.days-grid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:1px;
  background:var(--border);
  border-radius:10px;overflow:hidden;
  margin-bottom:1.25rem;
}
.day-col{background:var(--surface);padding:.85rem .7rem}
.day-name{
  font-family:'JetBrains Mono',monospace;
  font-size:.6rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);margin-bottom:.6rem;
  padding-bottom:.4rem;border-bottom:1px solid var(--border);
}
.day-col.sat{background:color-mix(in srgb,var(--c,#4f8ef7) 8%,var(--surface))}
.day-col.sat .day-name{color:var(--c,#4f8ef7)}
.day-task{
  font-size:.72rem;color:var(--text);line-height:1.5;
}
.day-task + .day-task{margin-top:.5rem;padding-top:.5rem;border-top:1px solid var(--border)}
.day-task .task-label{
  font-size:.6rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  color:var(--muted);margin-bottom:.2rem;
}

/* SAT SPECIAL */
.sat-content{
  background:var(--cg,rgba(79,142,247,.08));
  border:1px solid color-mix(in srgb,var(--c,#4f8ef7) 20%,transparent);
  border-radius:8px;
  padding:.6rem .75rem;
  margin-top:.4rem;
}
.sat-content .sat-tag{
  font-family:'JetBrains Mono',monospace;
  font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--c,#4f8ef7);margin-bottom:.3rem;
}
.sat-content .sat-activity{
  font-size:.72rem;color:var(--white);font-weight:600;line-height:1.4;
}

/* RESOURCE ROW */
.resource-row{
  display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.75rem;
}
.res-chip{
  font-family:'JetBrains Mono',monospace;
  font-size:.62rem;font-weight:600;
  color:var(--c,var(--text));
  border:1px solid color-mix(in srgb,var(--c,white) 20%,transparent);
  border-radius:4px;padding:.2rem .55rem;
  background:var(--cg);
  text-decoration:none;
}
.res-chip:hover{opacity:.8}

/* MILESTONE */
.milestone{
  background:var(--surface);
  border:1px solid var(--border);
  border-left:3px solid var(--c,white);
  border-radius:8px;
  padding:.7rem 1rem;
  margin-top:.75rem;
  font-size:.8rem;
}
.milestone .m-label{
  font-family:'JetBrains Mono',monospace;
  font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--c,var(--text));margin-bottom:.25rem;

.milestone p{color:var(--muted);line-height:1.5}

@media(max-width:640px){
  .days-grid{grid-template-columns:repeat(2,1fr)}
  .stats-bar{gap:1.5rem}
}
</style>

// Generate date: starting Sat July 5 2026, week number wi (0-based)
function weekStart(wi) {
  // Mon before Sat July 5 2026 = June 29 2026
  const base = new Date(2026, 5, 29); // June 29
  base.setDate(base.getDate() + wi * 7);
  return base;
}
function fmtRange(wi){
  const mon = weekStart(wi);
  const sat = new Date(mon); sat.setDate(mon.getDate()+5);
  const mo = d => d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  return `${mo(mon)} – ${mo(sat)} ${sat.getFullYear()}`;
}
function satDate(wi){
  const mon = weekStart(wi);
  const sat = new Date(mon); sat.setDate(mon.getDate()+5);
  return sat.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'long',year:'numeric'});
}
function isCurrentWeek(wi){
  const mon = weekStart(wi);
  const sat = new Date(mon); sat.setDate(mon.getDate()+6);
  const today = new Date(2026,6,4); // July 4 2026 = today (Friday)
  // Week 0: June 29 – July 5 → today is in this week
  return today >= mon && today <= sat;
}

function colorStyle(track){
  const t = TC[track] || TC.mixed;
  return `style="--c:${t.c};--cg:${t.cg}"`;
}

function pillHTML(track, phase){
  const t = TC[track] || TC.mixed;
  const labels = {cyber:'Cybersecurity',ai:'AI',ethical:'Ethical Hacking',prog:'Programming',
    cloud:'Cloud',net:'Networking',db:'Database',linux:'Linux',sysadm:'Sys Admin',
    pentest:'Pentesting',ml:'ML',robotics:'Robotics',arduino:'Arduino',mixed:'Multi-Track'};
  return `<span class="track-pill" style="--c:${t.c};--cg:${t.cg}">${labels[track]||track}</span>`;
}

function buildCalendar(){
  const nav = document.getElementById('semNav');
  const main = document.getElementById('main');

  semesters.forEach((sem, si) => {
    // Tab
    const btn = document.createElement('button');
    btn.className = `sem-tab${si===0?' active':''}`;
    btn.id = `semtab-${sem.id}`;
    btn.innerHTML = `${sem.label} <span style="color:var(--muted);font-size:.65rem">· ${sem.subtitle}</span>`;
    btn.onclick = () => activateSem(sem.id);
    nav.appendChild(btn);

    // Block
    const block = document.createElement('div');
    block.className = `semester${si===0?' active':''}`;
    block.id = `sem-${sem.id}`;

    block.innerHTML = `
      <div style="padding:2rem 0 1.5rem">
        <div class="semester-title">${sem.label}: ${sem.subtitle}</div>
        <div class="semester-sub">${sem.range} · Weeks ${sem.weeks[0]+1}–${sem.weeks[1]+1}</div>
      </div>
    `;

    const [wStart, wEnd] = sem.weeks;
    for(let wi = wStart; wi <= wEnd; wi++){
      const w = schedule[wi];
      if(!w) continue;
      const isCurrent = isCurrentWeek(wi);
      const card = document.createElement('div');
      card.className = `week-card${isCurrent?' current open':''}`;
      card.id = `week-${wi}`;

      const days = ['mon','tue','wed','thu','fri'];
      const dayNames = ['Monday','Tuesday','Wednesday','Thursday','Friday'];

      let daysHTML = days.map((d,i) => `
        <div class="day-col">
          <div class="day-name">${dayNames[i]}</div>
          <div class="day-task">${w[d]}</div>
        </div>
      `).join('');

      daysHTML += `
        <div class="day-col sat" ${colorStyle(w.track)}>
          <div class="day-name">Saturday · Practice</div>
          <div class="sat-content" ${colorStyle(w.track)}>
            <div class="sat-tag">🏟 Club Session</div>
            <div class="sat-activity">${w.sat}</div>
          </div>
        </div>
      `;

      const resHTML = w.resources.map(r => `<span class="res-chip" ${colorStyle(w.track)}>${r}</span>`).join('');
      const milHTML = w.milestone ? `
        <div class="milestone" ${colorStyle(w.track)}>
          <div class="m-label">🏆 Milestone</div>
          <p>${w.milestone}</p>
        </div>` : '';

      card.innerHTML = `
        <div class="week-header" onclick="toggleWeek(${wi})">
          <div class="week-num">Week ${wi+1}</div>
          <div class="week-title-wrap">
            <div class="week-date">${fmtRange(wi)}</div>
            <div class="week-title">
              ${isCurrent ? '<span class="current-badge">● This Week</span>' : ''}
              ${pillHTML(w.track, w.phase)}
              <span>${w.title}</span>
            </div>
          </div>
          <div class="week-toggle">▼</div>
        </div>
        <div class="week-body">
          <div class="days-grid">${daysHTML}</div>
          <div class="resource-row">${resHTML}</div>
          ${milHTML}
        </div>
      `;

      block.appendChild(card);
    }

    main.appendChild(block);
  });
}

function activateSem(id){
  document.querySelectorAll('.sem-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.semester').forEach(s=>s.classList.remove('active'));
  document.getElementById(`semtab-${id}`).classList.add('active');
  document.getElementById(`sem-${id}`).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

function toggleWeek(wi){
  const card = document.getElementById(`week-${wi}`);
  card.classList.toggle('open');
}

buildCalendar();

// Auto-scroll to current week on load
window.addEventListener('load', () => {
  const cur = document.querySelector('.week-card.current');
  if(cur) setTimeout(()=>cur.scrollIntoView({behavior:'smooth',block:'center'}),300);
});
</script>
</body>
